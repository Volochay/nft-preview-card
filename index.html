<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Preview Card</title>

    <link rel="stylesheet" href="./preview.css">
</head>
<body>

    <div class="card">

        <div class="image-box">
            <img class="nft-img" src="./images/image-equilibrium.jpg" alt="NFT">
            
            <div class="overlay">
                <img src="./images/icon-view.svg" alt="View">
            </div>
        </div>

        <h1>Equilibrium #3429</h1>

        <p class="description">
            Our Equilibrium collection promotes balance and calm.
        </p>

        <div class="info">
            <span class="price">0.041 ETH</span>
            <span class="time">3 days left</span>
        </div>

        <hr>

        <div class="author">
            <img class="avatar" src="./images/image-avatar.png" alt="Avatar">
            <span>Creation of <strong>Jules Wyvern</strong></span>
        </div>

    </div>

</body>
</html>
